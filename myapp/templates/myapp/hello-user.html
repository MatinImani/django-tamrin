<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خوش‌آمدگویی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .container h1 {
            color: #667eea;
            font-size: 36px;
            margin-bottom: 20px;
        }

        .container .username {
            color: #764ba2;
            font-size: 48px;
            font-weight: bold;
            margin: 20px 0;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            display: inline-block;
        }

        .container p {
            color: #666;
            font-size: 18px;
            margin-top: 20px;
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="emoji">👋</div>
        <h1>سلام!</h1>
        <div class="username">{{ username }}</div>
        <p>به سایت ما خوش آمدی</p>
    </div>
</body>

</html>
