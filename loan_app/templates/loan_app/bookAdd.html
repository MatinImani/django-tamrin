<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>افزودن کتاب جدید</title>
    
    <!-- فونت فارسی وزیرمتن -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazirmatn', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            direction: rtl;
        }

        .form-container {
            background: #ffffff;
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 550px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #f093fb, #f5576c);
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: white;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(240, 147, 251, 0.4);
            animation: pulse 2s infinite;
        }

        .form-header h1 {
            color: #2d3748;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #4a5568;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            transition: color 0.3s ease;
        }

        .form-group label .required {
            color: #f5576c;
            margin-right: 3px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            color: #2d3748;
            background: #f7fafc;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #f093fb;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(240, 147, 251, 0.1);
            transform: translateY(-2px);
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        .form-group input:hover {
            border-color: #cbd5e0;
        }

        .form-group .input-icon {
            position: absolute;
            left: 15px;
            top: 42px;
            font-size: 18px;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .form-group input:focus ~ .input-icon {
            opacity: 1;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.3);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(245, 87, 108, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn .btn-icon {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .submit-btn:hover .btn-icon {
            transform: translateX(-5px);
        }

        /* انیمیشن‌ها */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        /* ریسپانسیو */
        @media (max-width: 600px) {
            .form-container {
                padding: 30px 25px;
                border-radius: 20px;
            }

            .form-header h1 {
                font-size: 22px;
            }

            .form-header .icon {
                width: 70px;
                height: 70px;
                font-size: 30px;
            }

            .form-group input {
                padding: 12px 15px;
                font-size: 14px;
            }

            .submit-btn {
                padding: 14px;
                font-size: 15px;
            }
        }

        /* افکت موفقیت (اختیاری - برای آینده) */
        .success-message {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
            animation: slideUp 0.4s ease-out;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>

<body>
    <div class="form-container">
        
        <div class="form-header">
            <div class="icon">📚</div>
            <h1>افزودن کتاب جدید</h1>
            <p>اطلاعات کتاب را وارد کنید</p>
        </div>

        <!-- پیام موفقیت (برای استفاده در آینده با AJAX) -->
        <div class="success-message" id="successMsg">
            ✅ کتاب با موفقیت اضافه شد!
        </div>

        <form action="#" method="GET">
            <!-- {% csrf_token %} -->
            <div class="form-group">
                <label for="title">
                    <span class="required">*</span>
                    عنوان کتاب
                </label>
                <input 
                    type="text" 
                    id="title" 
                    name="title" 
                    placeholder="مثال: دیوان حافظ"
                    required
                >
                <span class="input-icon">✏️</span>
            </div>

            <div class="form-group">
                <label for="author">
                    <span class="required">*</span>
                    مولف
                </label>
                <input 
                    type="text" 
                    id="author" 
                    name="author" 
                    placeholder="مثال: حافظ شیرازی"
                    required
                >
                <span class="input-icon">👤</span>
            </div>

            <div class="form-group">
                <label for="year">
                    <span class="required">*</span>
                    سال چاپ
                </label>
                <input 
                    type="number" 
                    id="year" 
                    name="year" 
                    placeholder="مثال: 1402"
                    min="1000"
                    max="2100"
                    required
                >
                <span class="input-icon">📅</span>
            </div>

            <button type="submit" class="submit-btn">
                <span class="btn-icon">➕</span>
                ثبت کتاب
            </button>

        </form>
    </div>

</html>
